version: '3.8'

services:
  db:
    image: postgres:13
    env_file: .env
    ports: 
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
    
  api:
    image: ahmedhossam09/issue-api
    env_file: .env
    expose:
      - "8080"
    depends_on:
      - db
    deploy:
      replicas: 3
      endpoint_mode: dnsrr
      update_config:
        parallelism: 1
        delay: "10s"
  proxy:
    image: ahmedhossam09/issue-proxy
    env_file: .env
    ports:
      - "8081:8081"
    deploy:
      replicas: 1
    depends_on:
      - api

  notifications:
    image: ahmedhossam09/issue-notifications
    env_file: .env
    ports:
      - "50051:50051"
      - "8082:8082"
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: "5s"
  mongo:
    image: mongo:latest
    env_file: .env
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    deploy:
      replicas: 1
  redis:
    image: redis:alpine
    env_file: .env
    ports:
      - "6379:6379"   
    deploy:
      replicas: 1 




volumes:
  postgres_data:
  mongo_data:
