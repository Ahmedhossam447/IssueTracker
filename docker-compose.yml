version: '3.8'

services:

  api:
    image: ahmedhossam09/issue-api
    env_file: .env
    expose:
      - "8080"
    deploy:
      replicas: 3
      endpoint_mode: dnsrr
      update_config:
        parallelism: 1
        delay: "10s"
    depends_on:
      - haproxy
  proxy:
    image: ahmedhossam09/issue-proxy
    env_file: .env
    ports:
      - "8081:8081"
    deploy:
      replicas: 1
    depends_on:
      - api

  notifications:
    image: ahmedhossam09/issue-notifications
    env_file: .env
    ports:
      - "50051:50051"
      - "8082:8082"
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: "5s"
  mongo:
    image: mongo:latest
    env_file: .env
    ports:
      - "27017:27017"
    command: [ "--replSet", "rs0", "--bind_ip_all" ]
  mongo2:
    image: mongo:latest
    env_file: .env
    ports:
      - "27018:27017"
    command: [ "--replSet", "rs0", "--bind_ip_all" ]
  mongo3:
    image: mongo:latest
    env_file: .env
    ports:
      - "27019:27017"
    command: [ "--replSet", "rs0", "--bind_ip_all" ]
  redis:
    image: redis:alpine
    env_file: .env
    ports:
      - "6379:6379"
    deploy:
      replicas: 1
  etcd1:
    image: quay.io/coreos/etcd:v3.5.0
    env_file: .env
    environment:
      - ETCD_NAME=etcd1
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd1:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd1:2379
  etcd2:
    image: quay.io/coreos/etcd:v3.5.0
    env_file: .env
    environment:
      - ETCD_NAME=etcd2
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd2:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd2:2379
  etcd3:
    image: quay.io/coreos/etcd:v3.5.0
    env_file: .env
    environment:
      - ETCD_NAME=etcd3
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd3:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd3:2379
  
  patroni1:
    image: ghcr.io/zalando/spilo-17:4.0-p3
    env_file: .env
    environment:
      - PATRONI_NAME=patroni1
    volumes:
      - patroni1_data:/home/postgres/pgdata
  patroni2:
    image: ghcr.io/zalando/spilo-17:4.0-p3
    env_file: .env
    environment:
      - PATRONI_NAME=patroni2
    volumes:
      - patroni2_data:/home/postgres/pgdata

  patroni3:
    image: ghcr.io/zalando/spilo-17:4.0-p3
    env_file: .env
    environment:
      - PATRONI_NAME=patroni3
    volumes:
      - patroni3_data:/home/postgres/pgdata

  haproxy:
    image : haproxy:latest
    volumes :
    - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    ports :
    - "5432:5432"

volumes:
  patroni1_data:
  patroni2_data:
  patroni3_data:
