

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password123!
      POSTGRES_DB: IssueTrackerDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=IssueTrackerDb;Username=postgres;Password=Password123!
      - GrpcSettings__NotificationServiceUrl=http://notifications:50051
    expose:
      - "8080"
    depends_on:
      - db
    deploy:
      replicas: 3
  proxy:
    build:
      context: ./Proxy
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
        - API_HOSTNAME=api
        - API_PORT=8080
    depends_on:
      - api

  notifications:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=mongodb://admin:AdminPassword123!@mongo:27017
      - REDIS_URI=redis:6379
    ports:
      - "50051:50051"
      - "8082:8082"
  mongo:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=AdminPassword123!
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"    




volumes:
  postgres_data:
  mongo_data:
