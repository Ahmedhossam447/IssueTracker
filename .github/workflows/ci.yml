name: .NET Clean Architecture CI

"on":
  push:
    branches:
      - master
    paths:
        - 'IssueTracker/**'
        - '*.sln'
        - 'Dockerfile'
  pull_request:
    branches:
      - master
    paths:
        - 'IssueTracker/**'
        - '*.sln'
        - 'Dockerfile'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Restore dependencies
      run: dotnet restore "IssueTracker/IssueTracker.API.csproj"
    - name: Build
      run: dotnet build "IssueTracker/IssueTracker.API.csproj" --no-restore -c Release
    - name: build docker image
      run: docker build -t issuetracker-api:test .
  
